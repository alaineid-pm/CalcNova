<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guides — Finance, Health & Productivity Articles | CalcNova</title>
  <meta name="description" content="Free guides on personal finance, health, and productivity. Practical articles on FIRE, debt payoff, compound interest, macros, calories, and more from CalcNova.">

  <!-- Canonical -->
  <link rel="canonical" href="https://calcnova.co/guides.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Guides — Finance, Health & Productivity Articles | CalcNova">
  <meta property="og:description" content="Free guides on compound interest, FIRE, debt payoff, time zones, and more. Practical articles to help you make smarter decisions.">
  <meta property="og:url" content="https://calcnova.co/guides.html">
  <meta property="og:site_name" content="CalcNova">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "CalcNova Guides",
    "url": "https://calcnova.co/guides.html",
    "description": "Free guides on personal finance, health, and productivity.",
    "publisher": {
      "@type": "Organization",
      "name": "CalcNova",
      "url": "https://calcnova.co"
    }
  }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/nav.css">
  <style>
    .app { position: relative; z-index: 1; max-width: 1060px; margin: 0 auto; padding: 0 16px 60px; }

    /* ── Page hero ── */
    .page-hero {
      text-align: center;
      padding: 48px 20px 36px;
    }
    .page-hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, rgba(16,185,129,.1), rgba(99,102,241,.1));
      border: 1px solid rgba(16,185,129,.25);
      border-radius: 100px; padding: 6px 16px;
      font-size: 12px; font-weight: 700; color: var(--green);
      letter-spacing: .4px; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .page-hero h1 {
      font-size: 40px; font-weight: 800; letter-spacing: -.8px;
      line-height: 1.15; margin-bottom: 14px;
    }
    .page-hero h1 span {
      background: linear-gradient(135deg, var(--green), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-hero-desc {
      font-size: 16px; color: var(--text-secondary); line-height: 1.6;
      max-width: 560px; margin: 0 auto;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin: 32px 0 36px;
    }
    .filter-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 100px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--text-secondary); cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--green); color: var(--green); }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* ── Articles grid ── */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .article-card {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 16px; padding: 24px;
      text-decoration: none; color: inherit;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .article-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,.08);
      border-color: var(--green);
    }
    .article-card-icon {
      font-size: 32px; margin-bottom: 14px;
      line-height: 1;
    }
    .article-card-meta {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .article-card-cat {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; color: var(--green);
    }
    .article-card-sep { color: var(--text-secondary); font-size: 11px; }
    .article-card-time {
      font-size: 11px; color: var(--text-secondary);
    }
    .article-card h2 {
      font-size: 17px; font-weight: 700; line-height: 1.35;
      margin-bottom: 8px; color: var(--text);
    }
    .article-card p {
      font-size: 13.5px; color: var(--text-secondary); line-height: 1.55;
      flex: 1; margin-bottom: 16px;
    }
    .article-card-cta {
      font-size: 13px; font-weight: 700; color: var(--green);
      display: flex; align-items: center; gap: 4px;
    }

    /* ── Empty state ── */
    .no-results {
      text-align: center; padding: 60px 20px;
      color: var(--text-secondary); font-size: 15px;
      display: none;
    }

    @media (max-width: 600px) {
      .page-hero h1 { font-size: 28px; }
      .articles-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="page-hero">
    <div class="page-hero-badge">📝 All Guides</div>
    <h1>Learn &amp; <span>Understand</span></h1>
    <p class="page-hero-desc">Practical articles to help you make smarter financial, health, and productivity decisions.</p>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all" type="button">All</button>
  </div>

  <div class="articles-grid" id="articlesGrid"></div>
  <div class="no-results" id="noResults">No guides found for this category.</div>

</div>

<script src="shared/site-data.js"></script>
<script>
  window.CALCNOVA_PAGE = { id: '' };
</script>
<script src="shared/nav.js"></script>
<script>
(function () {
  var articles = window.CALCNOVA_ARTICLES || [];
  var grid     = document.getElementById('articlesGrid');
  var filterBar = document.getElementById('filterBar');
  var noResults = document.getElementById('noResults');
  var activeFilter = 'all';

  /* Build category filter buttons */
  var cats = [];
  articles.forEach(function (a) {
    var cat = a.category || 'Other';
    if (cats.indexOf(cat) === -1) cats.push(cat);
  });
  cats.forEach(function (cat) {
    var btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.setAttribute('data-cat', cat);
    btn.setAttribute('type', 'button');
    btn.textContent = cat;
    filterBar.appendChild(btn);
  });

  /* Render articles */
  function render(filter) {
    var sorted = articles.slice().sort(function (a, b) {
      return (b.datePublished || '').localeCompare(a.datePublished || '');
    });
    var filtered = filter === 'all' ? sorted : sorted.filter(function (a) { return (a.category || 'Other') === filter; });

    grid.innerHTML = filtered.map(function (a) {
      return '<a href="' + a.url + '" class="article-card">'
        + '<div class="article-card-icon">' + a.emoji + '</div>'
        + '<div class="article-card-meta">'
        +   '<span class="article-card-cat">' + (a.category || '') + '</span>'
        +   (a.readTime ? '<span class="article-card-sep">·</span><span class="article-card-time">' + a.readTime + ' read</span>' : '')
        + '</div>'
        + '<h2>' + a.name + '</h2>'
        + '<p>' + a.description + '</p>'
        + '<span class="article-card-cta">Read guide →</span>'
        + '</a>';
    }).join('');

    noResults.style.display = filtered.length ? 'none' : 'block';
  }

  /* Filter button clicks */
  filterBar.addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.getAttribute('data-cat');
    render(activeFilter);
  });

  render('all');
})();
</script>
</body>
</html>

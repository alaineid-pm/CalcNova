<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalcNova · World Clock</title>
  <meta name="description" content="A clean world clock with multiple cities, offsets, and day/night indicator. Runs entirely in your browser." />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared/nav.css" />

  <style>
    .app { position: relative; z-index: 1; max-width: 1060px; margin: 0 auto; padding: 0 16px 60px; }

    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px 28px 24px;
      margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .hero-title { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .hero-title span {
      background: linear-gradient(135deg, var(--green), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-desc { font-size: 14px; color: var(--text-secondary); margin-top: 6px; line-height: 1.5; }

    .pill-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, rgba(16,185,129,.1), rgba(99,102,241,.1));
      border: 1px solid rgba(16,185,129,.25);
      border-radius: 100px; padding: 6px 14px;
      font-size: 12px; font-weight: 700; color: var(--green);
    }

    .hero-right {
      display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:flex-end;
    }

    select, input[type="text"]{
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none;
      min-height: 40px;
    }
    select:focus, input[type="text"]:focus{
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(16,185,129,.12);
    }

    .action-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-secondary); font-family: var(--font); font-size: 13px; font-weight: 700;
      padding: 9px 14px; cursor: pointer; transition: all .15s; text-decoration: none;
      min-height: 40px;
    }
    .action-btn:hover { border-color: var(--green); color: var(--green); }
    .action-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .clock-grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 920px){ .clock-grid{ grid-template-columns: repeat(2, 1fr);} }
    @media (max-width: 620px){ .clock-grid{ grid-template-columns: 1fr;} .hero-title{font-size:20px;} }

    .clock-card{
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 18px 16px;
      position: relative;
      overflow:hidden;
      min-height: 150px;
    }
    .clock-card::before{
      content:'';
      position:absolute;
      top:0; right:0;
      width:60px; height:60px;
      border-radius: 0 18px 0 60px;
      opacity: .08;
      background: var(--purple);
    }
    .clock-card.day::before{ background: var(--green); }

    .city-row{ display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
    .city-name{ font-size: 14px; font-weight: 900; letter-spacing: -.2px; }
    .city-tz{ font-size: 12px; color: var(--text-muted); font-family: var(--mono); margin-top: 4px; }

    .time-big{ font-family: var(--mono); font-size: 34px; font-weight: 900; margin-top: 14px; letter-spacing: -0.5px; }
    .date-small{ font-size: 12px; color: var(--text-secondary); margin-top: 6px; font-weight: 700; }

    .meta-row{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top: 14px; flex-wrap:wrap; }
    .chip{
      display:inline-flex; align-items:center; gap:6px;
      background: var(--bg);
      border:1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-secondary);
      font-family: var(--mono);
    }
    .chip strong{ color: var(--green); }

    .remove-btn{
      border:none;
      background: transparent;
      color: var(--text-muted);
      cursor:pointer;
      padding: 4px 6px;
      border-radius: 8px;
      font-size: 14px;
      transition: all .15s;
    }
    .remove-btn:hover{ background: var(--bg); color: var(--red); }

    .footer-note{
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 20px;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.55;
    }

    #toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 200;
      background: #0f1623; color: white;
      padding: 10px 18px; border-radius: 100px;
      font-size: 12px; font-weight: 700; font-family: var(--mono);
      display: flex; align-items: center; gap: 7px;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      opacity: 0; transform: translateY(8px);
      transition: opacity .25s, transform .25s; pointer-events: none;
    }

    @media print {
      body { background: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body::before { display: none; }
      header, #toast, .icon-btn, .pill-badge, .nav-tools-wrap, .donate-btn,
      .mega-menu, .menu-overlay, .site-footer, .footer-disclaimer { display: none !important; }
      .app { padding: 0; max-width: 100%; }
      .hero { border: none; padding: 12px 0 8px; margin-bottom: 10px; }
      .clock-card, .footer-note { page-break-inside: avoid; }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- nav.js injects header here -->

    <div class="hero">
      <div>
        <div class="pill-badge">🕐 Multi-city · Offsets · Day/Night</div>
        <div class="hero-title">World <span>Clock</span></div>
        <div class="hero-desc">Add cities to compare time zones instantly — perfect for distributed teams.</div>
      </div>

      <div class="hero-right">
        <select id="citySelect"></select>
        <button class="action-btn" onclick="addSelected()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
          Add
        </button>
        <button class="action-btn" onclick="copyAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="action-btn" onclick="printPage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
      </div>
    </div>

    <div class="clock-grid" id="grid"></div>

    <div class="footer-note">
      <b>How it works:</b> This tool uses <code>Intl.DateTimeFormat</code> in your browser to format dates/times for each IANA time zone. Offsets may vary by date due to daylight saving rules.
    </div>

    <!-- nav.js injects footer here -->
  </div>

  <div id="toast"><span style="color:var(--green);font-size:15px;">✓</span> <span id="toast-msg">Copied!</span></div>

<script>
  // Curated defaults (IANA time zones)
  const CITY_PRESETS = [
    { label: 'Toronto (America/Toronto)', tz: 'America/Toronto' },
    { label: 'New York (America/New_York)', tz: 'America/New_York' },
    { label: 'Los Angeles (America/Los_Angeles)', tz: 'America/Los_Angeles' },
    { label: 'London (Europe/London)', tz: 'Europe/London' },
    { label: 'Paris (Europe/Paris)', tz: 'Europe/Paris' },
    { label: 'Dubai (Asia/Dubai)', tz: 'Asia/Dubai' },
    { label: 'Mumbai (Asia/Kolkata)', tz: 'Asia/Kolkata' },
    { label: 'Singapore (Asia/Singapore)', tz: 'Asia/Singapore' },
    { label: 'Tokyo (Asia/Tokyo)', tz: 'Asia/Tokyo' },
    { label: 'Sydney (Australia/Sydney)', tz: 'Australia/Sydney' },
    { label: 'Auckland (Pacific/Auckland)', tz: 'Pacific/Auckland' }
  ];

  const DEFAULT_CITIES = ['America/Toronto','Europe/London','Asia/Dubai'];

  function showToast(msg){
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.style.opacity = '1'; toast.style.transform = 'translateY(0)';
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(8px)'; }, 2200);
  }

  function pad2(n){ return String(n).padStart(2,'0'); }

  function fmtTime(tz, d){
    return new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      hour: '2-digit', minute:'2-digit', second:'2-digit',
      hour12: false
    }).format(d);
  }

  function fmtDate(tz, d){
    return new Intl.DateTimeFormat('en-US', {
      timeZone: tz,
      weekday: 'short', month:'short', day:'2-digit', year:'numeric'
    }).format(d);
  }

  function fmtOffset(tz, d){
    // Prefer ECMA-402: timeZoneName:'shortOffset' (shows GMT+X). Fallback to numeric offset derived from parts.
    try{
      const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName:'shortOffset', hour:'2-digit' }).formatToParts(d);
      const off = parts.find(p => p.type === 'timeZoneName');
      if (off && off.value) return off.value.replace('GMT','UTC');
    }catch(e){}

    try{
      const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName:'longOffset', hour:'2-digit' }).formatToParts(d);
      const off = parts.find(p => p.type === 'timeZoneName');
      if (off && off.value) return off.value.replace('GMT','UTC');
    }catch(e){}

    return 'UTC';
  }

  function isDaytime(tz, d){
    const hour = Number(new Intl.DateTimeFormat('en-US', { timeZone: tz, hour:'2-digit', hour12:false }).format(d));
    return hour >= 6 && hour < 18;
  }

  function shortTz(tz){
    return tz.split('/').pop().replace(/_/g,' ');
  }

  function buildCard(tz){
    const label = CITY_PRESETS.find(x=>x.tz===tz)?.label || (shortTz(tz) + ' ('+tz+')');

    const card = document.createElement('div');
    card.className = 'clock-card';
    card.dataset.tz = tz;

    card.innerHTML = `
      <div class="city-row">
        <div>
          <div class="city-name">${label.replace(/\s*\([^)]*\)\s*/,'')}</div>
          <div class="city-tz">${tz}</div>
        </div>
        <button class="remove-btn" title="Remove" onclick="removeCity('${tz}')">✕</button>
      </div>

      <div class="time-big" id="t-${tz}">—</div>
      <div class="date-small" id="d-${tz}">—</div>

      <div class="meta-row">
        <div class="chip">Offset <strong id="o-${tz}">—</strong></div>
        <div class="chip"><span id="dn-${tz}">—</span></div>
      </div>
    `;

    return card;
  }

  function render(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    state.cities.forEach(tz => grid.appendChild(buildCard(tz)));
    tick();
  }

  function tick(){
    const now = new Date();
    state.cities.forEach(tz => {
      const t = document.getElementById('t-' + tz);
      const d = document.getElementById('d-' + tz);
      const o = document.getElementById('o-' + tz);
      const dn = document.getElementById('dn-' + tz);
      if (!t || !d || !o || !dn) return;

      t.textContent = fmtTime(tz, now);
      d.textContent = fmtDate(tz, now);
      o.textContent = fmtOffset(tz, now);

      const day = isDaytime(tz, now);
      dn.textContent = day ? '☀️ Day' : '🌙 Night';

      const card = document.querySelector(`.clock-card[data-tz="${tz}"]`);
      if (card){
        card.classList.toggle('day', day);
      }
    });
  }

  function addSelected(){
    const sel = document.getElementById('citySelect');
    const tz = sel.value;
    if (!tz) return;
    if (state.cities.includes(tz)) { showToast('Already added'); return; }
    state.cities.push(tz);
    persist();
    render();
    showToast('Added');
  }

  function removeCity(tz){
    state.cities = state.cities.filter(x => x !== tz);
    if (state.cities.length === 0){
      // keep at least one city
      state.cities = ['America/Toronto'];
    }
    persist();
    render();
  }

  function copyAll(){
    const now = new Date();
    const lines = ['CalcNova · World Clock', ''];
    state.cities.forEach(tz => {
      const label = CITY_PRESETS.find(x=>x.tz===tz)?.label || tz;
      lines.push(`${label}: ${fmtTime(tz, now)} (${fmtOffset(tz, now)}) · ${fmtDate(tz, now)}`);
    });
    navigator.clipboard.writeText(lines.join('\n')).then(()=>showToast('Copied!')).catch(()=>showToast('Copy failed'));
  }

  function printPage(){ window.print(); }

  // Persistence
  const LS_KEY = 'cn_world_clock_cities';
  const state = { cities: [] };

  function persist(){
    try{ localStorage.setItem(LS_KEY, JSON.stringify(state.cities)); }catch(e){}
  }

  function restore(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      if (raw){
        const arr = JSON.parse(raw);
        if (Array.isArray(arr) && arr.length) return arr;
      }
    }catch(e){}
    return DEFAULT_CITIES.slice();
  }

  // Init
  (function init(){
    const sel = document.getElementById('citySelect');
    sel.innerHTML = CITY_PRESETS.map(c => `<option value="${c.tz}">${c.label}</option>`).join('');

    state.cities = restore();
    render();

    // keep clock updated
    setInterval(tick, 1000);

    // redraw on dark mode change (nav.js dispatches this)
    document.addEventListener('calcnova:darkchanged', function(){ tick(); });
  })();
</script>

<script>
  window.CALCNOVA_PAGE = {
    id: 'world-clock',
    disclaimer: 'This tool formats times using your browser\'s Intl time zone data. Offsets can change due to daylight saving rules.'
  };
</script>
<script src="shared/nav.js"></script>

</body>
</html>

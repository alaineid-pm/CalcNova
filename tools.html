<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Tools — Free Online Calculators | CalcNova</title>
  <meta name="description" content="Browse all CalcNova tools: finance calculators, health & fitness tools, math utilities, and productivity tools. Free, fast, no signup required.">

  <!-- Canonical -->
  <link rel="canonical" href="https://calcnova.co/tools.html">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="All Tools — Free Online Calculators | CalcNova">
  <meta property="og:description" content="Browse all CalcNova tools: compound interest, BMI, mortgage, tip calculator, unit converter, and more. Free & private.">
  <meta property="og:url" content="https://calcnova.co/tools.html">
  <meta property="og:site_name" content="CalcNova">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "CalcNova Tools Directory",
    "url": "https://calcnova.co/tools.html",
    "description": "Browse all free online calculators and tools on CalcNova — finance, health, math, and productivity.",
    "publisher": {
      "@type": "Organization",
      "name": "CalcNova",
      "url": "https://calcnova.co"
    }
  }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/nav.css">
  <style>
    .app { position: relative; z-index: 1; max-width: 1060px; margin: 0 auto; padding: 0 16px 60px; }

    /* ── Page hero ── */
    .page-hero {
      text-align: center;
      padding: 48px 20px 36px;
    }
    .page-hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, rgba(16,185,129,.1), rgba(99,102,241,.1));
      border: 1px solid rgba(16,185,129,.25);
      border-radius: 100px; padding: 6px 16px;
      font-size: 12px; font-weight: 700; color: var(--green);
      letter-spacing: .4px; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .page-hero h1 {
      font-size: 40px; font-weight: 800; letter-spacing: -.8px;
      line-height: 1.15; margin-bottom: 14px;
    }
    .page-hero h1 span {
      background: linear-gradient(135deg, var(--green), var(--purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .page-hero-desc {
      font-size: 16px; color: var(--text-secondary); line-height: 1.6;
      max-width: 560px; margin: 0 auto;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin: 32px 0 36px;
    }
    .filter-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px; border-radius: 100px;
      border: 1.5px solid var(--border); background: var(--surface);
      font-family: var(--font); font-size: 13px; font-weight: 600;
      color: var(--text-secondary); cursor: pointer;
      transition: all .15s;
    }
    .filter-btn:hover { border-color: var(--green); color: var(--green); }
    .filter-btn.active { background: var(--green); border-color: var(--green); color: #fff; }

    /* ── Category section ── */
    .cat-section { margin-bottom: 48px; }
    .cat-section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .cat-section-header h2 {
      font-size: 20px; font-weight: 800; letter-spacing: -.3px;
    }
    .cat-count {
      font-size: 12px; font-weight: 600; color: var(--text-secondary);
      background: var(--bg-secondary); border-radius: 100px; padding: 2px 10px;
    }

    /* ── Tools grid ── */
    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .tool-card {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px; padding: 16px 18px;
      text-decoration: none; color: inherit;
      transition: transform .15s, box-shadow .15s, border-color .15s;
      position: relative;
    }
    .tool-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,.07);
      border-color: var(--green);
    }
    .tool-card-icon {
      font-size: 26px; flex-shrink: 0; line-height: 1;
      margin-top: 2px;
    }
    .tool-card-body { flex: 1; min-width: 0; }
    .tool-card-name {
      font-size: 14px; font-weight: 700; margin-bottom: 4px;
      color: var(--text); line-height: 1.3;
    }
    .tool-card-desc {
      font-size: 12px; color: var(--text-secondary); line-height: 1.5;
    }
    .tool-badge {
      position: absolute; top: 12px; right: 12px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; border-radius: 100px; padding: 2px 8px;
    }
    .tool-badge.popular { background: rgba(245,158,11,.15); color: #d97706; }
    .tool-badge.new     { background: rgba(99,102,241,.15); color: #6366f1; }

    /* ── Empty state ── */
    .no-results {
      text-align: center; padding: 60px 20px;
      color: var(--text-secondary); font-size: 15px;
      display: none;
    }

    @media (max-width: 600px) {
      .page-hero h1 { font-size: 28px; }
      .tools-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="page-hero">
    <div class="page-hero-badge">🔧 All Tools</div>
    <h1>Every <span>Calculator</span></h1>
    <p class="page-hero-desc">Free, private calculators for finance, health, math, and productivity. No account needed.</p>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-cat="all" type="button">All</button>
  </div>

  <div id="toolsContainer"></div>
  <div class="no-results" id="noResults">No tools found for this category.</div>

</div>

<script src="shared/site-data.js"></script>
<script>
  window.CALCNOVA_PAGE = { id: '' };
</script>
<script src="shared/nav.js"></script>
<script>
(function () {
  var tools      = window.CALCNOVA_TOOLS      || [];
  var categories = window.CALCNOVA_CATEGORIES || [];
  var container  = document.getElementById('toolsContainer');
  var filterBar  = document.getElementById('filterBar');
  var noResults  = document.getElementById('noResults');
  var activeFilter = 'all';

  /* Build filter buttons from categories (skip guides) */
  categories.filter(function (c) { return c.id !== 'guides'; }).forEach(function (cat) {
    var count = tools.filter(function (t) { return t.category === cat.id; }).length;
    if (!count) return;
    var btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.setAttribute('data-cat', cat.id);
    btn.setAttribute('type', 'button');
    btn.textContent = cat.emoji + ' ' + cat.name;
    filterBar.appendChild(btn);
  });

  /* Render tool sections */
  function render(filter) {
    var catsToShow = filter === 'all'
      ? categories.filter(function (c) { return c.id !== 'guides'; })
      : categories.filter(function (c) { return c.id === filter; });

    var html = '';
    var anyVisible = false;

    catsToShow.forEach(function (cat) {
      var catTools = tools.filter(function (t) { return t.category === cat.id; });
      if (!catTools.length) return;
      anyVisible = true;

      var cards = catTools.map(function (t) {
        var badge = t.badge ? '<span class="tool-badge ' + t.badge + '">' + t.badge + '</span>' : '';
        return '<a href="' + t.url + '" class="tool-card">'
          + badge
          + '<div class="tool-card-icon">' + t.emoji + '</div>'
          + '<div class="tool-card-body">'
          +   '<div class="tool-card-name">' + t.name + '</div>'
          +   '<div class="tool-card-desc">' + t.description + '</div>'
          + '</div>'
          + '</a>';
      }).join('');

      html += '<div class="cat-section" data-cat="' + cat.id + '">'
        + '<div class="cat-section-header">'
        +   '<span style="font-size:22px">' + cat.emoji + '</span>'
        +   '<h2>' + cat.name + '</h2>'
        +   '<span class="cat-count">' + catTools.length + '</span>'
        + '</div>'
        + '<div class="tools-grid">' + cards + '</div>'
        + '</div>';
    });

    container.innerHTML = html;
    noResults.style.display = anyVisible ? 'none' : 'block';
  }

  /* Filter button clicks */
  filterBar.addEventListener('click', function (e) {
    var btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    activeFilter = btn.getAttribute('data-cat');
    render(activeFilter);
  });

  render('all');
})();
</script>
</body>
</html>
